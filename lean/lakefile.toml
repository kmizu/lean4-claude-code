name = "shallot"
defaultTargets = ["Shallot", "Lens"]
testDriver = "lenstests"

[leanOptions]
autoImplicit = false

[[lean_lib]]
name = "Shallot"
roots = ["Shallot", "Audit", "Json"]

[[lean_lib]]
name = "Lens"

[[lean_exe]]
name = "extract"
root = "Lens.Main"
supportInterpreter = true

[[lean_exe]]
name = "shallot-runner"
root = "Runner"

[[lean_exe]]
name = "lenstests"
root = "LensTests"
supportInterpreter = true

[[lean_exe]]
name = "json-suite"
root = "JsonSuite"
